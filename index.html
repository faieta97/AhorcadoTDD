<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahorcado - TDD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top, #1e1b4b 0%, #09090b 100%);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.15);
      --lives-color: #f43f5e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px 32px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeIn 0.8s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      background: linear-gradient(to right, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .word-container {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      min-width: 280px;
      text-align: center;
      margin: 20px 0;
      color: var(--text-primary);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      color: var(--text-secondary);
    }

    .lives-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      color: var(--lives-color);
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 9999px;
      transition: all 0.3s ease;
    }

    .lives-icon {
      margin-right: 6px;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.15);
      }
    }

    .guess-form {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .guess-input {
      width: 60px;
      height: 60px;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 14px;
      color: var(--text-primary);
      outline: none;
      caret-color: var(--accent);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .guess-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .guess-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 24px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #8b5cf6, #f472b6);
      color: white;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    .guess-btn:hover {
      opacity: 0.88;
    }

    .guess-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div>
        <h1>AHORCADO</h1>
        <div class="subtitle">Juego de Palabras</div>
      </div>

      <div class="word-container" id="word" data-testid="word"></div>

      <div class="status-container">
        <span>Intentos restantes:</span>
        <span class="lives-badge">
          <span class="lives-icon">❤️</span>
          <span id="lives" data-testid="lives"></span>
        </span>
      </div>

      <form class="guess-form" id="guess-form">
        <input
          class="guess-input"
          type="text"
          id="guess-input"
          maxlength="1"
          autocomplete="off"
          aria-label="Ingresá una letra"
          placeholder="A"
        />
        <button class="guess-btn" type="submit">Adivinar</button>
      </form>
    </div>
  </div>

  <script type="module" src="/src/ui/index.ts"></script>
</body>
</html>
